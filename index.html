<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="media.js" defer></script>
    <title>pagina de login</title>
</head>
<body>
     <div class="container">

        <div>
            <img class="img" src="logo_projeto.png">
        </div>
        
    <form class="input">
        
        <p class="login">LOGIN</p>

        <p >Username</p>
        <input type="text" placeholder="Nome completo" name="Username" required/>

        <input type="password" placeholder="Digite sua senha" name="Password" required/>

        <div class="botao">
       <button type="button">Entrar</button>
       </div>
    
       <div class="esqueceu">
       <p>Esqueceu a senha?</p>
       </div>

    </form>
    </div>

</body>
</html>
